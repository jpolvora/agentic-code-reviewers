# Exemplo — code review em repositório consumidor (GitHub Actions)
#
# Copie para .github/workflows/code-review.yml no seu projeto.
# Configure o secret CURSOR_API_KEY em Settings → Secrets.
#
# ── Opção A (recomendada): reusable workflow ─────────────────────────────

name: Agentic Code Review

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    uses: jpolvora/agentic-code-reviewers/.github/workflows/review-remote.yml@release
    secrets:
      CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}

