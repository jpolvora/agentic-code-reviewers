# Revisão agêntica em PRs para main — uma job por engine (matrix).
# Executa via run.sh --local (checkout atual, sem clone da branch release).
# Sequential: workflow_dispatch input ou vars.AGENTIC_CODE_REVIEWERS_EXECUTION_MODE=sequential
#
# Secrets (por engine):
#   cursor-sdk → CURSOR_API_KEY
#   opencode   → OPENCODE_API_KEY
# Opcional: AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN (PAT) — resolveReviewThread; default github.token
name: Agentic Code Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      execution_mode:
        description: parallel ou sequential
        required: false
        default: parallel
        type: choice
        options: [parallel, sequential]
      pr_number:
        description: Número da PR (obrigatório em execução manual)
        required: true
        type: string
      source_branch:
        description: Branch de origem (head ref)
        required: true
        type: string
      target_branch:
        description: Branch de destino (base ref)
        required: false
        default: main
        type: string

permissions:
  pull-requests: write
  contents: read

env:
  EXECUTION_MODE: ${{ github.event.inputs.execution_mode || vars.AGENTIC_CODE_REVIEWERS_EXECUTION_MODE || 'parallel' }}
  PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  SOURCE_BRANCH: ${{ github.head_ref || github.event.inputs.source_branch }}
  TARGET_BRANCH: ${{ github.event.pull_request.base.ref || github.event.inputs.target_branch || 'main' }}

jobs:
  review:
    name: Review (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ (github.event.inputs.execution_mode || vars.AGENTIC_CODE_REVIEWERS_EXECUTION_MODE || 'parallel') == 'sequential' && 1 || 10 }}
      matrix:
        include:
          - engine: cursor-sdk
            model: composer-2.5
            bot_tag: '[Cursor Reviewer]'
          - engine: opencode
            model: opencode-go/deepseek-v4-flash
            bot_tag: '[Cursor Reviewer · OpenCode]'

    concurrency:
      group: review-${{ matrix.engine }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci

      - if: matrix.engine == 'cursor-sdk'
        run: npm run typecheck

      - name: Validate engine secret
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
        run: |
          if [ "${{ matrix.engine }}" = "cursor-sdk" ] && [ -z "$CURSOR_API_KEY" ]; then
            echo "::error::Configure secret CURSOR_API_KEY em Settings → Secrets (engine cursor-sdk)."
            exit 1
          fi
          if [ "${{ matrix.engine }}" = "opencode" ] && [ -z "$OPENCODE_API_KEY" ]; then
            echo "::error::Configure secret OPENCODE_API_KEY em Settings → Secrets (engine opencode)."
            exit 1
          fi

      - name: Run reviewer (${{ matrix.engine }})
        env:
          AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN: ${{ secrets.AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN || github.token }}
          AGENTIC_CODE_REVIEWERS_ENGINE: ${{ matrix.engine }}
          AGENTIC_CODE_REVIEWERS_MODEL: ${{ matrix.model }}
          AGENTIC_CODE_REVIEWERS_BOT_TAG: ${{ matrix.bot_tag }}
          AGENTIC_CODE_REVIEWERS_REVIEW_SELF: 'true'
          CURSOR_API_KEY: ${{ matrix.engine == 'cursor-sdk' && secrets.CURSOR_API_KEY || '' }}
          OPENCODE_API_KEY: ${{ matrix.engine == 'opencode' && secrets.OPENCODE_API_KEY || '' }}
        run: |
          bash run.sh --local --gh \
            --pr-id "$PR_NUMBER" \
            --source-branch "$SOURCE_BRANCH" \
            --target-branch "$TARGET_BRANCH"
        continue-on-error: true
