# Revisão agêntica — um check por engine (matrix). Dispara apenas em PRs para main.
# Modo padrão: paralelo. Sequential via workflow_dispatch ou vars.AGENTIC_CODE_REVIEWERS_EXECUTION_MODE.
#
# Secrets (Settings → Secrets and variables → Actions):
#   AGENTIC_CODE_REVIEWERS_CURSOR_API_KEY  — obrigatório (legado: CURSOR_API_KEY)
#   AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY — job opencode (legado: OPENCODE_GO_API_KEY)
# GITHUB_TOKEN é automático (github.token); não precisa cadastrar.
#
# Variables opcionais (Settings → Secrets and variables → Actions → Variables):
#   AGENTIC_CODE_REVIEWERS_EXECUTION_MODE — parallel | sequential (legado: REVIEWER_EXECUTION_MODE)
name: Agentic Code Review

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      execution_mode:
        description: Executar reviews das engines em paralelo ou sequencialmente
        required: false
        default: parallel
        type: choice
        options:
          - parallel
          - sequential
      pr_number:
        description: Número da PR (obrigatório em execução manual)
        required: true
        type: string
      source_branch:
        description: Branch de origem (head ref, ex. feat/minha-feature)
        required: true
        type: string
      target_branch:
        description: Branch de destino (base ref, ex. main)
        required: true
        default: main
        type: string

permissions:
  pull-requests: write
  contents: read

env:
  EXECUTION_MODE: ${{ github.event.inputs.execution_mode || vars.AGENTIC_CODE_REVIEWERS_EXECUTION_MODE || vars.REVIEWER_EXECUTION_MODE || 'parallel' }}
  PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  # Nomes curtos — o runner normaliza para refs/heads/* via loadConfig
  SOURCE_BRANCH: ${{ github.head_ref || github.event.inputs.source_branch }}
  TARGET_BRANCH: ${{ github.event.pull_request.base.ref || github.event.inputs.target_branch || 'main' }}

jobs:
  review:
    name: Review (${{ matrix.engine }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: ${{ env.EXECUTION_MODE == 'sequential' && 1 || 10 }}
      matrix:
        include:
          - engine: cursor-sdk
            model: composer-2.5
            bot_tag: '[Cursor Reviewer]'
            opencode_setup: false
          - engine: opencode
            model: opencode-go/deepseek-v4-flash
            bot_tag: '[Cursor Reviewer · OpenCode]'
            opencode_setup: true

    concurrency:
      group: review-${{ matrix.engine }}-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Typecheck TypeScript
        if: matrix.engine == 'cursor-sdk'
        run: npm run typecheck

      - name: Install OpenCode CLI
        if: matrix.opencode_setup
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Configure OpenCode Go credentials
        if: matrix.opencode_setup
        env:
          AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY: ${{ secrets.AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY || secrets.OPENCODE_GO_API_KEY }}
        run: |
          if [ -z "$AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY" ]; then
            echo "::error::Secret AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY (ou legado OPENCODE_GO_API_KEY) não configurado."
            exit 1
          fi
          mkdir -p ~/.local/share/opencode
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const authPath = path.join(process.env.HOME, '.local/share/opencode/auth.json');
          const auth = {
            'opencode-go': { type: 'api', key: process.env.AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY },
          };
          fs.writeFileSync(authPath, JSON.stringify(auth, null, 2));
          NODE

      - name: Validate required secrets
        env:
          CURSOR_KEY: ${{ secrets.AGENTIC_CODE_REVIEWERS_CURSOR_API_KEY || secrets.CURSOR_API_KEY }}
          OPENCODE_KEY: ${{ secrets.AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY || secrets.OPENCODE_GO_API_KEY }}
        run: |
          if [ -z "$CURSOR_KEY" ]; then
            echo "::error::Configure o secret AGENTIC_CODE_REVIEWERS_CURSOR_API_KEY (ou legado CURSOR_API_KEY) em Settings → Secrets and variables → Actions."
            exit 1
          fi
          if [ "${{ matrix.opencode_setup }}" = "true" ] && [ -z "$OPENCODE_KEY" ]; then
            echo "::error::Configure o secret AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY (ou legado OPENCODE_GO_API_KEY) para a engine opencode."
            exit 1
          fi

      - name: Run Reviewer Agent (${{ matrix.engine }})
        env:
          AGENTIC_CODE_REVIEWERS_CURSOR_API_KEY: ${{ secrets.AGENTIC_CODE_REVIEWERS_CURSOR_API_KEY || secrets.CURSOR_API_KEY }}
          AGENTIC_CODE_REVIEWERS_GITHUB_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          AGENTIC_CODE_REVIEWERS_ENGINE: ${{ matrix.engine }}
          AGENTIC_CODE_REVIEWERS_MODEL: ${{ matrix.model }}
          AGENTIC_CODE_REVIEWERS_BOT_TAG: ${{ matrix.bot_tag }}
          AGENTIC_CODE_REVIEWERS_REVIEW_SELF: 'true'
          AGENTIC_CODE_REVIEWERS_OPENCODE_HOSTNAME: 127.0.0.1
          AGENTIC_CODE_REVIEWERS_OPENCODE_PORT: '4096'
          AGENTIC_CODE_REVIEWERS_OPENCODE_AGENT: explore
          AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY: ${{ secrets.AGENTIC_CODE_REVIEWERS_OPENCODE_GO_API_KEY || secrets.OPENCODE_GO_API_KEY }}
        run: |
          npx tsx src/index.ts --gh \
            --pr-id "$PR_NUMBER" \
            --source-branch "$SOURCE_BRANCH" \
            --target-branch "$TARGET_BRANCH"
        continue-on-error: true
