# Merge em main → testes, build de todas as engines, bump de versão e deploy na branch release.
# Commits com [skip ci] no message (ex.: bump automático) não re-disparam este workflow.
name: Release and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build engines and deploy release
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build TypeScript (all engines)
        run: npm run build

      - name: Verify engine adapters compiled
        run: |
          test -f dist/engine/index.js
          test -f dist/engine/cursor-sdk/engine.js
          test -f dist/engine/opencode/engine.js
          echo "Engines compiladas: cursor-sdk, opencode"

      - name: Bump Version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch -m "chore(release): bump version to %s [skip ci]"
          git push origin HEAD:main --follow-tags

      - name: Deploy Compiled Code to Release Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf .release-tmp
          mkdir -p .release-tmp

          cp -r dist .release-tmp/dist
          cp -r skills .release-tmp/skills
          cp package.json .release-tmp/package.json
          cp package-lock.json .release-tmp/package-lock.json
          cp README.md .release-tmp/README.md
          cp LICENSE .release-tmp/LICENSE 2>/dev/null || true
          cp AGENTS.md .release-tmp/AGENTS.md 2>/dev/null || true
          cp run.sh .release-tmp/run.sh
          chmod +x .release-tmp/run.sh

          echo "node_modules/" > .release-tmp/.gitignore
          echo ".release-tmp/" >> .release-tmp/.gitignore

          cd .release-tmp
          git init -b release
          git add -A

          NEW_VERSION=$(node -e "console.log(require('./package.json').version)")
          git commit -m "chore: release build v$NEW_VERSION from GitHub Actions ($GITHUB_SHA)"

          echo "Publicando artefatos compilados (todas as engines) na branch release..."
          git push https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git release --force
